<body class="approved-page">
  <div class="approved-page__container">
    <div class="status-card">
      <div class="status-card__content">
        <div class="status-card__text">
          <h1 class="status-card__title">Pronto! Seu pagamento já foi aprovado</h1>
          <p class="status-card__operation" id="operation-id">Operação #—</p>
        </div>
        <div class="status-check" aria-hidden="true">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" fill="#00A650"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="detail-card">
      <div class="detail-card__main">
        <div class="detail-card__icon detail-card__icon--pix">
          <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path fill="#32bcad" d="M11.9,12h-0.68l8.04-8.04c2.62-2.61,6.86-2.61,9.48,0L36.78,12H36.1c-1.6,0-3.11,0.62-4.24,1.76l-6.8,6.77c-0.59,0.59-1.53,0.59-2.12,0l-6.8-6.77C15.01,12.62,13.5,12,11.9,12z"/>
            <path fill="#32bcad" d="M36.1,36h0.68l-8.04,8.04c-2.62,2.61-6.86,2.61-9.48,0L11.22,36h0.68c1.6,0,3.11-0.62,4.24-1.76l6.8-6.77c0.59-0.59,1.53-0.59,2.12,0l6.8,6.77C32.99,35.38,34.5,36,36.1,36z"/>
            <path fill="#32bcad" d="M44.04,28.74L38.78,34H36.1c-1.07,0-2.07-0.42-2.83-1.17l-6.8-6.78c-1.36-1.36-3.58-1.36-4.94,0l-6.8,6.78C13.97,33.58,12.97,34,11.9,34H9.22l-5.26-5.26c-2.61-2.62-2.61-6.86,0-9.48L9.22,14h2.68c1.07,0,2.07,0.42,2.83,1.17l6.8,6.78c0.68,0.68,1.58,1.02,2.47,1.02s1.79-0.34,2.47-1.02l6.8-6.78C34.03,14.42,35.03,14,36.1,14h2.68l5.26,5.26C46.65,21.88,46.65,26.12,44.04,28.74z"/>
          </svg>
        </div>
        <div class="detail-card__info">
          <p class="detail-card__line1" id="amount-text">Você pagou no Pix</p>
          <p class="detail-card__line2" id="approved-amount">R$ 0,00</p>
          <p class="detail-card__line3">O pagamento foi aprovado na hora.</p>
        </div>
      </div>
      <div class="detail-footer">
        <div class="detail-footer__left">
          <span class="detail-footer__info" aria-label="Informação">
            <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="12" r="10" fill="none" stroke="#2563eb" stroke-width="2"/>
              <path d="M12 16v-4" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
              <circle cx="12" cy="7.5" r="1.5" fill="#2563eb"/>
            </svg>
          </span>
          <span>Com cobertura de Compra Garantida</span>
        </div>
      </div>
    </div>

    <a href="index.html?order=success" class="approved-page__back">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M3.45 7.4L8.33 2.54L7.48 1.69L1.15 7.99L7.48 14.3L8.33 13.45L3.46 8.6H14.6V7.4H3.45Z"/>
      </svg>
      Voltar para Animacase
    </a>
  </div>

  <script>
    (function() {
      var operationId = "animacase-" + (Date.now ? Date.now() : Math.random().toString(36).slice(2));
      try {
        var tx = sessionStorage.getItem('animacase_pix_transaction_id');
        if (tx) operationId = tx;
      } catch (_) {}
      var amountText = "Você pagou no Pix";
      var amount = 0;
      try {
        var stored = sessionStorage.getItem('animacase_pix_amount');
        if (stored) amount = parseFloat(String(stored).replace(',', '.')) || 0;
      } catch (_) {}
      var amountValue = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(amount);

      document.getElementById('operation-id').textContent = "Operação #" + operationId;
      document.getElementById('amount-text').textContent = amountText;
      document.getElementById('approved-amount').textContent = amountValue;
    })();
  </script>
</body>
</html>
